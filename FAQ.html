<!-- Declare the document type and HTML5 version -->
<!DOCTYPE html>
<!-- Root element of the web page -->
<html lang="en">

<!--===============
    Head Section
====================-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Displays title on the browser tab -->
    <title>Interactive FAQ-style webpage</title>
    <!-- Links external css file for styling -->
    <link rel="stylesheet" href="FAQ.css">
</head>

<!--==========================
Main content of the web page
==============================-->
<body>

        <section>
        <div id="faq-container"></div>
        </section>
    </main>
    
<!-- Links external Javascript file-->
<script src="FAQ.js" defer></script>
</body>
</html>
